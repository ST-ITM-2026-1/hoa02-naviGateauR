<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Github / Gitlab part of my website</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/script.js"></script>


</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <button id="theme-toggle">
                        <!-- the eyey-shaped SVG graphics for the theme-switcher were generated by AI -->
                        <span class="icon-eye icon-eye-dark">
                            <!-- geschlossenes Auge (Dark Mode) -->
                            <!-- SVG hier einfügen -->
                             <svg width="64" height="64" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M4 12C6.5 9 17.5 9 20 12" stroke="#a0522d" stroke-width="2.2" stroke-linecap="round"/>
                                <path d="M4 12C6.5 15 17.5 15 20 12" stroke="#a0522d" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
                                
                                <!-- kleine verspielte Wimpern -->
                                <path d="M8 10L7 8M12 9V7M16 10L17 8" stroke="#a0522d" stroke-width="1.6" stroke-linecap="round"/>
                            </svg>
                        </span>
                    
                        <span class="icon-eye icon-eye-light">
                            <!-- geöffnetes Auge (Light Mode) -->
                            <!-- SVG hier einfügen -->
                             <svg class="eye-glow" width="64" height="64" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <!-- Auge -->
                                <path d="M2 12C5 7 9 5 12 5C15 5 19 7 22 12C19 17 15 19 12 19C9 19 5 17 2 12Z"
                                        fill="#6b4f3d88" stroke="#ffb380" stroke-width="2"/>

                                <!-- Iris -->
                                <circle cx="12" cy="12" r="3.5" fill="#ffb380"/>
                                
                                <!-- Pupille -->
                                <circle cx="12" cy="12" r="1.6" fill="#2d251e"/>
                                
                                <!-- Glanz -->
                                <circle cx="13.2" cy="10.8" r="0.7" fill="white" opacity="0.9"/>
                            </svg>
                        </span>
                    </button>
                </li>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="myGithub.html">My Github</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Github</h1>
        <section class="git-profile">
                <article>
                        <h4 id="github-name"></h4>
                        <img src="" alt="Avatar picture of my profile on Github" id="github-avatar">
                        <p id="github-bio"></p>
                        <p id="github-employer"></p>
                        <p id="github-creation-date"></p>
                        <p id="github-amount-public-repos"></p>
                        <p id="github-amount-followers"></p>
                        <p id="github-amount-following"></p>
                        <p>Pay me a visit:
                            <a href="" id="github-profile-url"></a>
                        </p>
                </article>
            </section>
            <section class="projects-container" id="repository-cards">
                <article class="project-card">
                    <header>
                        <h4></h4>
                        <span id="github-topic"></span>
                        <span id="origin-own">Own Project</span>
                    </header>
                    <p id="repo-description"></p>
                    <p id="repo-primary-language"></p>
                    <p id="forks-count"></p>
                    <p id="stargazers-count"></p>
                    <p id="repo-size"></p>
                </article>
            </section>
    </main>



</body>

</html>
