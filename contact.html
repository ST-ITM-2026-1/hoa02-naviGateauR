<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
      <header>
        <nav>
            <ul> 
                <li>
                    <button id="theme-toggle">
                        <!-- the eyey-shaped SVG graphics for the theme-switcher were generated by AI -->
                        <!-- the eyey-shaped SVG graphics for the theme-switcher were generated by AI -->
                        <span class="icon-eye icon-eye-dark">
                            <!-- geschlossenes Auge (Dark Mode) -->
                            <!-- SVG hier einfügen -->

                                <path d="M4 12C6.5 9 17.5 9 20 12" stroke="#a0522d" stroke-width="2.2" stroke-linecap="round"/>
                                <path d="M4 12C6.5 15 17.5 15 20 12" stroke="#a0522d" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
                                
                                <!-- kleine verspielte Wimpern -->
                                <path d="M8 10L7 8M12 9V7M16 10L17 8" stroke="#a0522d" stroke-width="1.6" stroke-linecap="round"/>
                            </svg>
                        </span>
                    
                        <span class="icon-eye icon-eye-light">
                            <!-- geöffnetes Auge (Light Mode) -->
                            <!-- SVG hier einfügen -->
                             <svg class="eye-glow" width="64" height="64" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <!-- Auge -->
                                <path d="M2 12C5 7 9 5 12 5C15 5 19 7 22 12C19 17 15 19 12 19C9 19 5 17 2 12Z"
                                        fill="#6b4f3d88" stroke="#ffb380" stroke-width="2"/>

                                <!-- Pupille -->
                                <circle cx="12" cy="12" r="1.6" fill="#2d251e"/>

                                <circle cx="13.2" cy="10.8" r="0.7" fill="white" opacity="0.9"/>
                            </svg>
                        </span>
                    </button>
                </li>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
        <main>
            <h1>Get in touch, stalkers!</h1>
            <form id="contact-form">
                <div class="contact-form-row">
                    <label for="first-name">First Name:</label>
                    <input type="text" name="first-name" required placeholder="first name">
                    <label for="last-name">Last Name:</label>
                    <input type="text" name="last-name">
                </div>

                <div class="contact-form-row">
                    <label for="phone">Phone:</label>
                    <input type="tel" name="phone" required pattern="[\d\s\-\+$$$$]{10,20}" placeholder="+41 79 123 45 67">
                </div>

                 <div class="contact-form-row">
                    <label for="email">E-Mail:</label>
                    <input type="email" name="email" required placeholder="bla@bla.com">
                </div>

                <div class="contact-form-row">
                     <label for="message">Your message:</label>
                    <textarea id="textarea-message" name="message" rows="7" cols="30" required minlength="2" maxlength="30" placeholder="keep it short!"></textarea>
                    
                </div>
                <button type="submit">Submit</button>

            </form>

        </main>
</body>
</html>
